<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
      -webkit-app-region: drag;
      user-select: none;
    }
    /* Light mode: white background */
    @media (prefers-color-scheme: light) {
      body { background: #fff; }
      p { color: #111; }
    }
    /* Dark mode: black background */
    @media (prefers-color-scheme: dark) {
      body { background: #000; }
      p { color: #f0f0f0; }
    }
    img { width: 220px; height: auto; }
    p {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 40px; font-weight: 700; letter-spacing: 0.04em;
    }
    #dwell-ring {
      width: 60px; height: 60px; border-radius: 50%;
      border: 3px solid rgba(255,107,53,0.3);
      position: fixed; bottom: 40px;
      transition: border-color 0.3s;
    }
    #dwell-ring.active { border-color: #FF6B35; }
  </style>
</head>
<body>
  <img src="glorb.png" alt="Glorb">
  <p>Focus.</p>
  <div id="dwell-ring"></div>

  <script>
    // D-08: 5s continuous mousemove dwell-to-dismiss
    let dwellTimer = null
    let dwellStart = null
    const DWELL_MS = 5000

    document.addEventListener('mousemove', () => {
      if (!dwellStart) {
        dwellStart = Date.now()
        document.getElementById('dwell-ring').classList.add('active')
      }
      clearTimeout(dwellTimer)
      dwellTimer = setTimeout(() => {
        // Mouse was still for DWELL_MS — dismiss
        window.glorb.closeOverlay()
      }, DWELL_MS)
    })

    document.addEventListener('mouseleave', () => {
      dwellStart = null
      clearTimeout(dwellTimer)
      document.getElementById('dwell-ring').classList.remove('active')
    })
  </script>
</body>
</html>
