<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <meta name="viewport" content="width=220, initial-scale=1.0">
  <title>Glorb</title>
  <link rel="stylesheet" href="renderer.css">
</head>
<body>
  <div id="app">
    <!-- Close button (× — D-03, D-04) -->
    <button id="btn-close" title="Quit Glorb">&times;</button>

    <!-- Quit confirmation overlay (D-04) -->
    <div id="quit-overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-heading">
      <h2 id="overlay-heading">Quit Glorb?</h2>
      <p>This will close the app, not just hide the window.</p>
      <div class="overlay-buttons">
        <button id="btn-quit">Quit Glorb</button>
        <button id="btn-keep">Keep Running</button>
      </div>
    </div>

    <!-- Hamburger button (Phase 3 placeholder — not wired) -->
    <button id="btn-hamburger" aria-label="Open settings" aria-disabled="true">
      <div class="hamburger-bars">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>

    <!-- Timer view -->
    <div id="timer-view">
      <!-- SVG ring + glorb mascot stacked -->
      <div id="timer-ring">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <!-- Track circle (ghost ring) -->
          <circle
            cx="100" cy="100" r="92"
            fill="none"
            stroke="rgba(26, 26, 26, 0.1)"
            stroke-width="8"
          />
          <!-- Progress circle (animated countdown) -->
          <circle
            id="ring-progress"
            cx="100" cy="100" r="92"
            fill="none"
            stroke="#FF6B35"
            stroke-width="8"
            stroke-linecap="round"
            stroke-dasharray="578.05"
            stroke-dashoffset="0"
          />
        </svg>

        <!-- glorb mascot centered over ring -->
        <div id="glorb-container">
          <img
            id="glorb-img"
            src="assets/glorb.png"
            alt="Glorb mascot"
            onerror="this.style.display='none'; document.getElementById('glorb-placeholder').style.display='flex';"
          >
          <div id="glorb-placeholder" style="display:none;">G</div>
          <div id="glorb-vignette"></div>
        </div>
      </div>

      <!-- Time display -->
      <div id="time-display">00h 25m</div>

      <!-- Start / Pause / Resume button -->
      <button id="btn-start">Start</button>
    </div>
  </div>

  <script>
    const btnClose = document.getElementById('btn-close')
    const btnQuit = document.getElementById('btn-quit')
    const btnKeep = document.getElementById('btn-keep')
    const overlay = document.getElementById('quit-overlay')

    function showOverlay() {
      overlay.classList.add('visible')
      btnQuit.focus()
    }

    function hideOverlay() {
      overlay.classList.remove('visible')
    }

    btnClose.addEventListener('click', showOverlay)

    btnQuit.addEventListener('click', () => {
      window.glorb.quit()
    })

    btnKeep.addEventListener('click', hideOverlay)

    // === Phase 2: Timer Engine ===

    const CIRCUMFERENCE = 2 * Math.PI * 92  // ≈ 578.05px — matches SVG r=92
    const TOTAL_SECONDS = 25 * 60           // 1500 seconds

    const ringProgress = document.getElementById('ring-progress')
    const timeDisplay = document.getElementById('time-display')
    const btnStart = document.getElementById('btn-start')

    let remaining = TOTAL_SECONDS
    let timerState = 'idle'  // 'idle' | 'running' | 'paused'
    let intervalId = null

    function formatTime(secs) {
      const h = Math.floor(secs / 3600)
      const m = Math.floor((secs % 3600) / 60)
      return String(h).padStart(2, '0') + 'h ' + String(m).padStart(2, '0') + 'm'
    }

    function updateRing(secs) {
      const offset = CIRCUMFERENCE * (1 - secs / TOTAL_SECONDS)
      ringProgress.style.strokeDashoffset = offset
    }

    function tick() {
      remaining -= 1
      if (remaining <= 0) {
        remaining = 0
        updateRing(0)
        timeDisplay.textContent = '00h 00m'
        resetTimer()
        return
      }
      updateRing(remaining)
      timeDisplay.textContent = formatTime(remaining)
    }

    function resetTimer() {
      clearInterval(intervalId)
      intervalId = null
      timerState = 'idle'
      remaining = TOTAL_SECONDS
      // Disable transition for instant reset, then re-enable
      ringProgress.style.transition = 'none'
      updateRing(TOTAL_SECONDS)
      timeDisplay.textContent = formatTime(TOTAL_SECONDS)
      btnStart.textContent = 'Start'
      // Re-enable transition after a frame so next run animates smoothly
      requestAnimationFrame(() => {
        ringProgress.style.transition = 'stroke-dashoffset 1s linear'
      })
    }

    btnStart.addEventListener('click', () => {
      if (timerState === 'idle' || timerState === 'paused') {
        // Ensure transition is active before starting
        ringProgress.style.transition = 'stroke-dashoffset 1s linear'
        timerState = 'running'
        btnStart.textContent = 'Pause'
        intervalId = setInterval(tick, 1000)
      } else if (timerState === 'running') {
        // Pause: freeze ring without animation drift
        clearInterval(intervalId)
        intervalId = null
        timerState = 'paused'
        btnStart.textContent = 'Resume'
        ringProgress.style.transition = 'none'
      }
    })
  </script>
</body>
</html>
